name: IPQ60XX-24.10-6.12

on:
  workflow_dispatch:
  schedule:
    - cron: 0 19 * * *

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: 24.10-6.12
  CONFIG_FILE: configs/ipq60xx-6.12-nowifi.config
  DIY_SCRIPT: diy-script.sh
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialize Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk git gettext unzip zlib1g-dev file libssl-dev python3 python3-distutils rsync

    - name: Clone Source Code
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: Configure Build
      run: |
        cd $OPENWRT_PATH
        cp $CONFIG_FILE .config
        # 自动启用所有 kmod 内核模块
        sed -i 's/^# CONFIG_PACKAGE_kmod/CONFIG_PACKAGE_kmod/' .config
        make defconfig

    - name: Install Feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Download Sources
      run: |
        cd $OPENWRT_PATH
        make download -j$(nproc)

    - name: Compile All Kmods
      run: |
        cd $OPENWRT_PATH
        make package/kernel/linux/compile V=s -j$(nproc)

    - name: Organize Kernel Modules
      run: |
        cd $OPENWRT_PATH/bin/packages
        KMOD_OUTPUT_DIR=kmod_packages
        mkdir -p $KMOD_OUTPUT_DIR
        find ./ -type f -name "*.ipk" -exec mv {} $KMOD_OUTPUT_DIR/ \;
        cd $KMOD_OUTPUT_DIR
        # 生成 Packages 索引文件
        opkg-make-index . > Packages
        gzip -f Packages

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ${{ env.OPENWRT_PATH }}/bin/packages/kmod_packages
        keep_files: false
